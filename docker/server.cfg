// iortcw dedicated server config — omnibot edition
seta sv_hostname      "iortcw Omnibot Server"
seta sv_maxclients    20
// sv_pure 1 requires STANDALONE build to allow loading cgame/ui from custom pk3s.
// Set to 0 until iortcw is rebuilt with STANDALONE=1.
seta sv_pure          0
seta sv_allowDownload 1
seta g_password       ""
seta rconpassword     ""

// Map rotation — starts on Beach (mp_beach is the first official RTCW MP map)
seta g_gametype       5
seta timelimit        20
seta fraglimit        0

// Spawn times — pub-friendly (10s instead of map default ~30s).
// g_userAxisRespawnTime / g_userAlliedRespawnTime (in seconds) take priority
// over the map script's hardcoded wm_axis_respawntime / wm_allied_respawntime.
seta g_userAxisRespawnTime    10
seta g_userAlliedRespawnTime  10

// Omnibot settings
seta g_OmniBotEnable  1
seta g_OmniBotFlags   0
seta omnibot_path     "/rtcw/omni-bot"

// Start
map mp_beach
