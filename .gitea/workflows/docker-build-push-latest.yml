name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login repo.s4ndmod.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build images
        run: docker compose build --build-arg CACHE_BUST=${{ github.sha }}

      - name: Push :latest
        run: docker compose push

      - name: Push SHA tags
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26:latest     repo.s4ndmod.com/s4ndmod/s4ndmod26:${SHORT_SHA}
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest  repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26:${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${SHORT_SHA}

      - name: Prune old registry tags
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.error, os, sys, base64

          OWNER  = "S4NDMoD"
          IMAGES = ["s4ndmod26", "s4ndmod26-web"]
          KEEP   = 5
          USER   = os.environ["REGISTRY_USER"]
          PASS   = os.environ["REGISTRY_PASSWORD"]
          BASE   = "https://repo.s4ndmod.com/api/v1"
          AUTH   = base64.b64encode(f"{USER}:{PASS}".encode()).decode()

          def api(method, path):
              req = urllib.request.Request(f"{BASE}{path}", method=method)
              req.add_header("Authorization", f"Basic {AUTH}")
              try:
                  with urllib.request.urlopen(req) as r:
                      body = r.read()
                      return json.loads(body) if body else None
              except urllib.error.HTTPError as e:
                  print(f"  {method} {path} -> HTTP {e.code}", file=sys.stderr)
                  return None

          for image in IMAGES:
              pkgs = api("GET", f"/packages/{OWNER}?type=container&q={image}&limit=50") or []
              sha_tags = [p for p in pkgs
                          if p["name"] == image
                          and not p["version"].startswith("sha256:")
                          and p["version"] != "latest"]
              sha_tags.sort(key=lambda p: p["created_at"], reverse=True)
              to_delete = sha_tags[KEEP:]
              if not to_delete:
                  print(f"{image}: {len(sha_tags)} tag(s), nothing to prune")
                  continue
              for p in to_delete:
                  print(f"Deleting {image}:{p['version']}")
                  api("DELETE", f"/packages/{OWNER}/container/{image}/{p['version']}")
              print(f"{image}: kept {min(KEEP, len(sha_tags))}, deleted {len(to_delete)}")
          EOF

      - name: Update gitops
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          git clone https://${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_PASSWORD }}@repo.s4ndmod.com/travis/gitops.git /tmp/gitops
          cd /tmp/gitops
          sed -i "s/newTag: .*/newTag: \"${SHORT_SHA}\"/" apps/s4ndmod26/overlays/dev/kustomization.yaml
          git config user.email "ci@s4ndmod.com"
          git config user.name "Gitea CI"
          git add apps/s4ndmod26/overlays/dev/kustomization.yaml
          git commit -m "deploy s4ndmod26 ${SHORT_SHA}"
          git push
