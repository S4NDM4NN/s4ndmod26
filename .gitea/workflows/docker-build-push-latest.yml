name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login repo.s4ndmod.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build images
        run: docker compose build --build-arg CACHE_BUST=${{ github.sha }}

      - name: Push latest and build tags
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          docker compose push
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26:latest     repo.s4ndmod.com/s4ndmod/s4ndmod26:build-${SHORT_SHA}
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest  repo.s4ndmod.com/s4ndmod/s4ndmod26-web:build-${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26:build-${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26-web:build-${SHORT_SHA}
