name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login repo.s4ndmod.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Compute version
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          VERSION="v$(date +%y.%m.%d)-${SHORT_SHA}"
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build images
        run: VERSION=${{ env.VERSION }} docker compose build --build-arg CACHE_BUST=${{ github.sha }} --build-arg VERSION=${{ env.VERSION }}

      - name: Push latest and version tags
        run: |
          docker compose push
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26:latest     repo.s4ndmod.com/s4ndmod/s4ndmod26:${{ env.VERSION }}
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest  repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${{ env.VERSION }}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26:${{ env.VERSION }}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${{ env.VERSION }}
