// s4ndmod26 controller defaults
// exec this from console or autoexec.cfg: exec controller.cfg

seta in_joystick          "1"
seta in_joystickUseAnalog "1"
seta joy_threshold        "0.15"
seta in_controllerCurve   "1"
seta in_controllerLeanMod "3"

// Axis mapping: left stick = move, right stick = look
seta j_side_axis    "0"
seta j_forward_axis "1"
seta j_yaw_axis     "2"
seta j_pitch_axis   "3"
seta j_side         "0.25"
seta j_forward      "-0.25"
seta j_yaw          "-0.010"
seta j_pitch        "0.010"

// Left stick directions — required for analog movement routing
bind PAD0_LEFTSTICK_LEFT  "+moveleft"
bind PAD0_LEFTSTICK_RIGHT "+moveright"
bind PAD0_LEFTSTICK_UP    "+forward"
bind PAD0_LEFTSTICK_DOWN  "+back"

// Right stick directions — required for analog look routing
bind PAD0_RIGHTSTICK_LEFT  "+left"
bind PAD0_RIGHTSTICK_RIGHT "+right"
bind PAD0_RIGHTSTICK_UP    "+lookup"
bind PAD0_RIGHTSTICK_DOWN  "+lookdown"

// Face buttons
// Cross/A = jump, Circle/B = crouch, Square/X = reload, Triangle/Y = lean modifier
bind PAD0_A "+moveup"
bind PAD0_B "+movedown"
bind PAD0_X "+reload"
bind PAD0_Y ""

// Shoulders = weapon cycle, triggers = walk / fire
bind PAD0_LEFTSHOULDER  "weapprev"
bind PAD0_RIGHTSHOULDER "weapnext"
bind PAD0_LEFTTRIGGER   "+speed"
bind PAD0_RIGHTTRIGGER  "+attack"

// Stick clicks
bind PAD0_LEFTSTICK_CLICK  "+sprint"
bind PAD0_RIGHTSTICK_CLICK "+zoom"

// D-pad
bind PAD0_DPAD_UP    "+activate"
bind PAD0_DPAD_DOWN  "+quickgren"

// Lean: fired by engine when Triangle/Y is held + trigger pressed
bind JOY1 "+leanleft"
bind JOY2 "+leanright"

in_restart
