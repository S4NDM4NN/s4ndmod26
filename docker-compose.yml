services:
  rtcw-server:
    image: repo.s4ndmod.com/s4ndmod/s4ndmod26:latest
    build:
      context: .
      target: runtime
    ports:
      - "27960:27960/udp"
    volumes:
      - ./gamedata/main:/rtcw/main:ro
      - ./gamedata/s4ndmod26:/rtcw/s4ndmod26
      - rtcw-omnibot-data:/rtcw/omni-bot
    restart: unless-stopped
    networks: [internal]

  web:
    image: repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest
    build:
      context: .
      target: web
    environment:
      - RTCW_HOST=rtcw-server
      - RTCW_PORT=27960
      - STATUS_API_PORT=8080
    ports:
      - "99:80"
    volumes:
      - ./gamedata/main:/usr/share/nginx/html/downloads/main:ro
      - ./gamedata/s4ndmod26:/usr/share/nginx/html/downloads/s4ndmod26
    depends_on:
      - rtcw-server
    restart: unless-stopped
    networks: [internal]

volumes:
  rtcw-omnibot-data:

networks:
  internal:
    driver: bridge
