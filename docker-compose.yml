services:
  rtcw-server:
    image: repo.s4ndmod.com/s4ndmod/s4ndmod26:latest
    build:
      context: .
      target: runtime
    ports:
      - "27960:27960/udp"
    volumes:
      - ./main/pak0.pk3:/rtcw/main/pak0.pk3:ro
      - ./main/mp_pak0.pk3:/rtcw/main/mp_pak0.pk3:ro
      - ./main/mp_pak1.pk3:/rtcw/main/mp_pak1.pk3:ro
      - ./main/mp_pak2.pk3:/rtcw/main/mp_pak2.pk3:ro
      - ./main/mp_pak3.pk3:/rtcw/main/mp_pak3.pk3:ro
      - ./main/mp_pak4.pk3:/rtcw/main/mp_pak4.pk3:ro
      - ./main/mp_pak5.pk3:/rtcw/main/mp_pak5.pk3:ro
      - ./maps:/rtcw/main/maps:ro
      - ./docker/server.cfg:/rtcw/s4ndmod26/server.cfg:ro
      - rtcw-omnibot-data:/rtcw/omni-bot
    restart: unless-stopped
    networks: [internal]

  web:
    image: repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest
    build:
      context: .
      target: web
    environment:
      - RTCW_HOST=rtcw-server
      - RTCW_PORT=27960
      - STATUS_API_PORT=8080
    ports:
      - "99:80"
    volumes:
      - ./main/pak0.pk3:/usr/share/nginx/html/downloads/main/pak0.pk3:ro
      - ./main/mp_pak0.pk3:/usr/share/nginx/html/downloads/main/mp_pak0.pk3:ro
      - ./main/mp_pak1.pk3:/usr/share/nginx/html/downloads/main/mp_pak1.pk3:ro
      - ./main/mp_pak2.pk3:/usr/share/nginx/html/downloads/main/mp_pak2.pk3:ro
      - ./main/mp_pak3.pk3:/usr/share/nginx/html/downloads/main/mp_pak3.pk3:ro
      - ./main/mp_pak4.pk3:/usr/share/nginx/html/downloads/main/mp_pak4.pk3:ro
      - ./main/mp_pak5.pk3:/usr/share/nginx/html/downloads/main/mp_pak5.pk3:ro
    depends_on:
      - rtcw-server
    restart: unless-stopped
    networks: [internal]

volumes:
  rtcw-omnibot-data:

networks:
  internal:
    driver: bridge
