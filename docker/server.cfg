// iortcw dedicated server config — omnibot edition
seta sv_hostname      "^8S^14^8NDMoD^126"
seta sv_maxclients    20
seta sv_pure          1
seta sv_allowDownload 1
seta sv_master3       "wolfmaster.s4ndmod.com"
seta g_password       ""
seta rconpassword     ""

// Map rotation — starts on Beach (mp_beach is the first official RTCW MP map)
seta g_gametype       5
seta timelimit        20
seta fraglimit        0

// Spawn times — pub-friendly (10s instead of map default ~40/30s).
// g_userAxisRespawnTime / g_userAlliedRespawnTime (in seconds) take priority
// over the map scripts hardcoded wm_axis_respawntime / wm_allied_respawntime.
seta g_userAxisRespawnTime    15
seta g_userAlliedRespawnTime  8

// Omnibot settings
seta g_OmniBotEnable  1
seta g_OmniBotFlags   0
seta omnibot_path     "/rtcw/omni-bot"

// Start
map mp_beach
