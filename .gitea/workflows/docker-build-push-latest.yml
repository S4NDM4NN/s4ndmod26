name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login repo.s4ndmod.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build images
        run: docker compose build --build-arg CACHE_BUST=${{ github.sha }}

      - name: Push :latest
        run: docker compose push

      - name: Push SHA tags
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26:latest     repo.s4ndmod.com/s4ndmod/s4ndmod26:${SHORT_SHA}
          docker tag repo.s4ndmod.com/s4ndmod/s4ndmod26-web:latest  repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26:${SHORT_SHA}
          docker push repo.s4ndmod.com/s4ndmod/s4ndmod26-web:${SHORT_SHA}

      - name: Prune old registry tags
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.error, urllib.parse, os, sys, base64, re

          REGISTRY = "repo.s4ndmod.com"
          IMAGES   = ["s4ndmod/s4ndmod26", "s4ndmod/s4ndmod26-web"]
          KEEP     = 5
          USER     = os.environ["REGISTRY_USER"]
          PASS     = os.environ["REGISTRY_PASSWORD"]
          BASIC    = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
          MANIFEST = "application/vnd.docker.distribution.manifest.v2+json"

          def get_token(image, actions="pull,delete"):
              # Hit /v2/ unauthenticated to discover the token endpoint
              req = urllib.request.Request(f"https://{REGISTRY}/v2/")
              try:
                  urllib.request.urlopen(req)
                  return None  # no auth needed (unlikely)
              except urllib.error.HTTPError as e:
                  www = e.headers.get("Www-Authenticate", "")
              realm  = re.search(r'realm="([^"]+)"', www)
              service = re.search(r'service="([^"]+)"', www)
              realm   = realm.group(1)  if realm   else f"https://{REGISTRY}/v2/token"
              service = service.group(1) if service else REGISTRY
              scope = f"repository:{image}:{actions}"
              url = f"{realm}?service={urllib.parse.quote(service)}&scope={urllib.parse.quote(scope)}"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Basic {BASIC}")
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read()).get("token") or json.loads(r.read()).get("access_token")

          def v2(method, image, path, token, accept=None):
              req = urllib.request.Request(f"https://{REGISTRY}/v2/{image}{path}", method=method)
              req.add_header("Authorization", f"Bearer {token}")
              if accept:
                  req.add_header("Accept", accept)
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, dict(r.headers), r.read()
              except urllib.error.HTTPError as e:
                  return e.code, dict(e.headers), e.read()

          for image in IMAGES:
              name = image.split("/")[1]
              try:
                  token = get_token(image)
              except Exception as e:
                  print(f"{name}: auth failed: {e}", file=sys.stderr); continue

              status, _, body = v2("GET", image, "/tags/list", token)
              if status != 200:
                  print(f"{name}: tags/list -> HTTP {status}", file=sys.stderr); continue

              all_tags = json.loads(body).get("tags") or []
              sha_tags = [t for t in all_tags if t != "latest" and not t.startswith("sha256:")]
              sha_tags.sort(reverse=True)
              to_delete = sha_tags[KEEP:]

              if not to_delete:
                  print(f"{name}: {len(sha_tags)} tag(s), nothing to prune"); continue

              for tag in to_delete:
                  st, hdrs, _ = v2("HEAD", image, f"/manifests/{tag}", token, MANIFEST)
                  digest = hdrs.get("Docker-Content-Digest") or hdrs.get("docker-content-digest")
                  if not digest:
                      print(f"  {name}:{tag} - no digest, skipping"); continue
                  st2, _, _ = v2("DELETE", image, f"/manifests/{digest}", token)
                  print(f"Deleted {name}:{tag} ({digest[:19]}...) HTTP {st2}")

              print(f"{name}: kept {min(KEEP, len(sha_tags))}, deleted {len(to_delete)}")
          EOF

      - name: Update gitops
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          git clone https://${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_PASSWORD }}@repo.s4ndmod.com/travis/gitops.git /tmp/gitops
          cd /tmp/gitops
          sed -i "s/newTag: .*/newTag: \"${SHORT_SHA}\"/" apps/s4ndmod26/overlays/dev/kustomization.yaml
          git config user.email "ci@s4ndmod.com"
          git config user.name "Gitea CI"
          git add apps/s4ndmod26/overlays/dev/kustomization.yaml
          git commit -m "deploy s4ndmod26 ${SHORT_SHA}"
          git push
