<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Game — s4ndmod26</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; color: #d4d4d8; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  #header { padding: 12px 24px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 16px; }
  #header a.back { color: #52525b; font-size: 13px; text-decoration: none; white-space: nowrap; }
  #header a.back:hover { color: #a1a1aa; }
  #header h1 { font-size: 18px; font-weight: 600; color: #f4f4f5; }
  #header .meta { color: #71717a; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-live { background: #450a0a; color: #f87171; animation: pulse 2s ease-in-out infinite; }
  .badge-team1 { background: #450a0a; color: #f87171; }
  .badge-team2 { background: #0c1a3a; color: #60a5fa; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  #loading { padding: 60px; text-align: center; color: #52525b; }
  #status-msg { padding: 40px; text-align: center; color: #71717a; }
  #over-msg { padding: 40px; text-align: center; color: #a1a1aa; display: none; }
  #over-msg a { color: #60a5fa; text-decoration: none; }
  #over-msg a:hover { color: #93c5fd; }
  #timeline-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 80px); }
  #timeline-wrap svg { display: block; }

  /* Event click panel */
  #detail-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #18181b; border-top: 1px solid #27272a;
    padding: 12px 24px; display: none; z-index: 100;
    display: flex; gap: 32px; align-items: center;
  }
  #detail-panel.visible { display: flex; }
  #detail-panel .dp-close { margin-left: auto; cursor: pointer; color: #52525b; font-size: 18px; line-height: 1; }
  #detail-panel .dp-close:hover { color: #d4d4d8; }
  .dp-row { display: flex; flex-direction: column; gap: 2px; }
  .dp-label { font-size: 11px; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; }
  .dp-value { font-size: 14px; color: #f4f4f5; font-weight: 500; }

  /* Player modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .modal-box {
    background: #18181b; border: 1px solid #3f3f46; border-radius: 8px;
    width: min(560px, 96vw); max-height: 85vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-head {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px; border-bottom: 1px solid #27272a; flex-shrink: 0;
  }
  .modal-head h2 { font-size: 16px; color: #f4f4f5; flex: 1; }
  .modal-head .mbadge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  }
  .mbadge-ax   { background: #450a0a; color: #f87171; }
  .mbadge-al   { background: #0c1a3a; color: #60a5fa; }
  .mbadge-cls  { background: #1c1c27; color: #a78bfa; }
  .modal-close {
    background: none; border: none; color: #52525b; font-size: 20px;
    cursor: pointer; line-height: 1; padding: 0 2px;
  }
  .modal-close:hover { color: #d4d4d8; }
  .modal-stats {
    display: flex; gap: 0; flex-shrink: 0;
    border-bottom: 1px solid #27272a;
  }
  .stat-cell {
    flex: 1; padding: 12px 16px; text-align: center;
    border-right: 1px solid #27272a;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-num  { font-size: 22px; font-weight: 700; color: #f4f4f5; }
  .stat-lbl  { font-size: 10px; color: #52525b; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .modal-body { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .modal-section h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #52525b; margin-bottom: 8px;
  }
  .weapon-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .weapon-chip {
    background: #27272a; border-radius: 4px; padding: 3px 8px;
    font-size: 12px; color: #d4d4d8;
  }
  .ev-list { display: flex; flex-direction: column; gap: 4px; }
  .ev-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 8px; border-radius: 4px; background: #1c1c1f; font-size: 12px;
  }
  .ev-time { color: #52525b; font-family: monospace; width: 36px; flex-shrink: 0; }
  .ev-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ev-desc { color: #d4d4d8; flex: 1; }
  .ev-wpn  { color: #52525b; font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <a class="back" href="/games.html">← Games</a>
  <h1 id="title">Live Game</h1>
  <span id="meta-info" class="meta"></span>
  <span class="badge badge-live">● LIVE</span>
</div>

<div id="loading">Connecting…</div>
<div id="status-msg" style="display:none">Waiting for a match to start…</div>
<div id="over-msg"></div>
<div id="timeline-wrap" style="display:none"></div>

<div id="player-modal" class="modal-overlay" style="display:none" onclick="closePlayerModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="modal-name">Player</h2>
      <span id="modal-team-badge"  class="mbadge"></span>
      <span id="modal-class-badge" class="mbadge mbadge-cls"></span>
      <button class="modal-close" onclick="closePlayerModal()">✕</button>
    </div>
    <div class="modal-stats">
      <div class="stat-cell"><div class="stat-num" id="modal-kills">0</div><div class="stat-lbl">Kills</div></div>
      <div class="stat-cell"><div class="stat-num" id="modal-deaths">0</div><div class="stat-lbl">Deaths</div></div>
      <div class="stat-cell"><div class="stat-num" id="modal-alive-pct">0%</div><div class="stat-lbl">Time Alive</div></div>
      <div class="stat-cell"><div class="stat-num" id="modal-score">0</div><div class="stat-lbl">Score</div></div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>Weapons Carried</h3>
        <div class="weapon-chips" id="modal-weapons"></div>
      </div>
      <div class="modal-section">
        <h3>Events</h3>
        <div class="ev-list" id="modal-events"></div>
      </div>
    </div>
  </div>
</div>

<div id="detail-panel">
  <div class="dp-row"><span class="dp-label">Time</span><span class="dp-value" id="dp-time">—</span></div>
  <div class="dp-row"><span class="dp-label">Event</span><span class="dp-value" id="dp-event">—</span></div>
  <div class="dp-row"><span class="dp-label">Actor</span><span class="dp-value" id="dp-actor">—</span></div>
  <div class="dp-row"><span class="dp-label">Target</span><span class="dp-value" id="dp-target">—</span></div>
  <div class="dp-row"><span class="dp-label">Weapon</span><span class="dp-value" id="dp-weapon">—</span></div>
  <div class="dp-row"><span class="dp-label">Score</span><span class="dp-value" id="dp-score">—</span></div>
  <span class="dp-close" id="dp-close">✕</span>
</div>

<script>
'use strict';

// ---- Weapon name lookup ----
const WEAPON_NAMES = {
  0: 'None',
  1: 'Knife', 2: 'Luger', 3: 'MP40', 4: 'Mauser', 5: 'FG42',
  6: 'Grenade (Axis)', 7: 'Panzerfaust', 8: 'Venom', 9: 'Flamethrower',
  10: 'Tesla', 11: 'Speargun',
  12: 'Knife 2', 13: 'Colt', 14: 'Thompson', 15: 'Garand', 16: 'BAR',
  17: 'Grenade (Allied)', 18: 'Rocket Launcher',
  19: 'Sniper Rifle', 20: 'Snooper Scope', 21: 'Venom (Full)',
  22: 'Speargun CO2', 23: 'FG42 (Scoped)', 24: 'BAR 2',
  25: 'Sten', 26: 'Syringe', 27: 'Ammo Pack', 28: 'Arty',
  29: 'Silencer', 30: 'Akimbo',
  31: 'Crossbow', 32: 'Dynamite', 33: 'Dynamite 2', 34: 'Prox Mine',
  35: 'Monster Atk 1', 36: 'Monster Atk 2', 37: 'Monster Atk 3',
  38: 'Smoke Trail', 39: 'Gauntlet', 40: 'Sniper', 41: 'Mortar',
  42: 'Big Explosion',
  43: 'Medkit', 44: 'Pliers', 45: 'Smoke Grenade', 46: 'Binoculars',
};

const MOD_NAMES = {
  0: 'Unknown',
  1: 'Shotgun', 2: 'Gauntlet', 3: 'Machine Gun',
  4: 'Grenade', 5: 'Grenade Splash', 6: 'Rocket', 7: 'Rocket Splash',
  8: 'Railgun', 9: 'Lightning', 10: 'BFG', 11: 'BFG Splash',
  12: 'Knife', 13: 'Knife 2', 14: 'Knife Stealth',
  15: 'Luger', 16: 'Colt', 17: 'MP40', 18: 'Thompson', 19: 'Sten',
  20: 'Mauser', 21: 'Sniper Rifle', 22: 'Garand', 23: 'Snooper Scope',
  24: 'Silencer', 25: 'Akimbo', 26: 'BAR',
  27: 'FG42', 28: 'FG42 Scope', 29: 'Panzerfaust',
  30: 'Rocket Launcher', 31: 'Grenade Launcher',
  32: 'Venom', 33: 'Venom (Full)', 34: 'Flamethrower',
  35: 'Tesla', 36: 'Speargun', 37: 'Speargun CO2',
  38: 'Grenade Pineapple', 39: 'Cross',
  40: 'Mortar', 41: 'Mortar Splash',
  42: 'Kicked', 43: 'Grabber',
  44: 'Dynamite', 45: 'Dynamite Splash',
  46: 'Airstrike', 47: 'Syringe', 48: 'Ammo', 49: 'Arty',
  50: 'Water', 51: 'Slime', 52: 'Lava', 53: 'Crush',
  54: 'Telefrag', 55: 'Falling', 56: 'Suicide',
  57: 'Target Laser', 58: 'Trigger Hurt', 59: 'Grapple',
  60: 'Explosive', 61: 'Poison Gas',
  62: 'Zombie Spit', 63: 'Zombie Spit Splash',
  64: 'Zombie Spirit', 65: 'Zombie Spirit Splash',
  66: 'Loper Leap', 67: 'Loper Ground', 68: 'Loper Hit',
  69: 'LT Ammo', 70: 'LT Airstrike', 71: 'Engineer', 72: 'Medic',
  73: 'Bat', 74: 'Knife Thrown', 75: 'Goomba', 76: 'Poison',
};

// ---- SVG helpers ----
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function svgText(content, attrs) {
  const el = svgEl('text', attrs);
  el.textContent = content;
  return el;
}

// ---- Layout constants ----
const TIME_COL_W = 52;
const COL_W = 72;
const COL_PAD = 10;
const HEADER_H = 48;
const PX_PER_MS = 0.012;

const TEAM_COLORS = {
  1: { fill: '#7f1d1d', stroke: '#ef4444', text: '#fca5a5' },
  2: { fill: '#1e3a5f', stroke: '#3b82f6', text: '#93c5fd' },
};
const DEFAULT_TEAM_COLOR = { fill: '#27272a', stroke: '#52525b', text: '#a1a1aa' };

const EVENT_COLORS = {
  KILL: '#ef4444',
  HEADSHOT: '#f97316',
  EXPLOSIVE_KILL: '#f59e0b',
  KNIFE_KILL: '#a78bfa',
  MULTIKILL: '#ec4899',
  TEAMKILL: '#71717a',
  SUICIDE: '#71717a',
  REVIVE: '#22c55e',
  OBJECTIVE_STEAL: '#eab308',
  OBJECTIVE_RETURN: '#eab308',
  OBJECTIVE_CAPTURE: '#facc15',
  OBJECTIVE_DENIAL: '#f97316',
  TAPOUT: '#3f3f46',
};

function msToTimestamp(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function inferClass(weaponPeriods) {
  const weapons = new Set((weaponPeriods || []).map(w => w.weapon));
  if (weapons.has(26)) return 'Medic';
  if (weapons.has(44)) return 'Engineer';
  if (weapons.has(28) || weapons.has(45)) return 'Lieutenant';
  if (weapons.has(7) || weapons.has(8) || weapons.has(9) || weapons.has(18) ||
      weapons.has(21) || weapons.has(41)) return 'Soldier';
  return 'Soldier';
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function closePlayerModal(e) {
  if (e && e.target !== document.getElementById('player-modal')) return;
  document.getElementById('player-modal').style.display = 'none';
}

// ---- Timeline renderer (same as replay.html) ----
class TimelineRenderer {
  constructor(analysis) {
    this.a = analysis;
    this.startMs = analysis.meta.start_time_ms;
    this.endMs = analysis.meta.end_time_ms;
    this.durationMs = this.endMs - this.startMs;
    this.players = Object.keys(analysis.players).map(Number).sort((a, b) => {
      const ta = analysis.players[String(a)].team;
      const tb = analysis.players[String(b)].team;
      const order = t => t === 1 ? 0 : t === 2 ? 1 : 2;
      return order(ta) - order(tb) || a - b;
    });
    this.totalW = TIME_COL_W + this.players.length * COL_W;
    this.totalH = HEADER_H + Math.ceil(this.durationMs * PX_PER_MS) + 20;
  }

  timeToY(ms) { return HEADER_H + (ms - this.startMs) * PX_PER_MS; }

  playerX(clientNum) {
    const idx = this.players.indexOf(clientNum);
    return TIME_COL_W + idx * COL_W + COL_W / 2;
  }

  teamColor(team) { return TEAM_COLORS[team] || DEFAULT_TEAM_COLOR; }

  render() {
    const wrap = document.getElementById('timeline-wrap');
    wrap.innerHTML = '';

    // Sticky column-header SVG — sticks to top of the scroll container as you scroll down
    const headerSvg = svgEl('svg', {
      width: this.totalW,
      height: HEADER_H,
      viewBox: `0 0 ${this.totalW} ${HEADER_H}`,
      style: 'display:block',
    });
    this._renderColumnHeaders(headerSvg);
    headerSvg.appendChild(svgEl('line', {
      x1: TIME_COL_W, x2: TIME_COL_W, y1: 0, y2: HEADER_H,
      stroke: '#27272a', 'stroke-width': '1',
    }));
    headerSvg.addEventListener('click', (e) => this._handleClick(e));
    const stickyDiv = document.createElement('div');
    stickyDiv.style.cssText = 'position:sticky;top:0;z-index:10;';
    stickyDiv.appendChild(headerSvg);
    wrap.appendChild(stickyDiv);

    // Scrollable body SVG — viewBox clips out the header region
    const bodyH = this.totalH - HEADER_H;
    const svg = svgEl('svg', {
      width: this.totalW,
      height: bodyH,
      viewBox: `0 ${HEADER_H} ${this.totalW} ${bodyH}`,
      style: 'display:block',
    });
    svg.appendChild(svgEl('rect', { x: 0, y: 0, width: this.totalW, height: this.totalH, fill: '#0e0e12' }));
    this._renderPlayerBackgrounds(svg);
    this._renderEventLines(svg);
    this._renderEventDots(svg);
    this._renderTimeAxis(svg);
    svg.addEventListener('click', (e) => this._handleClick(e));
    wrap.appendChild(svg);

    wrap.style.display = 'block';
  }

  _renderPlayerBackgrounds(svg) {
    for (const cnum of this.players) {
      const p = this.a.players[String(cnum)];
      const x = TIME_COL_W + this.players.indexOf(cnum) * COL_W;
      const tc = this.teamColor(p.team);
      svg.appendChild(svgEl('rect', {
        x, y: HEADER_H, width: COL_W, height: Math.ceil(this.durationMs * PX_PER_MS),
        fill: '#18181b',
      }));
      for (const iv of (p.alive_intervals || [])) {
        const y1 = this.timeToY(iv.start_ms);
        const y2 = this.timeToY(iv.end_ms);
        svg.appendChild(svgEl('rect', {
          x: x + COL_PAD, y: y1, width: COL_W - COL_PAD * 2, height: Math.max(1, y2 - y1),
          fill: tc.fill, rx: '2',
        }));
      }
      for (const wp of (p.weapon_periods || [])) {
        const y = this.timeToY(wp.start_ms);
        const cx = x + COL_W / 2;
        svg.appendChild(svgEl('line', {
          x1: x + COL_PAD, x2: x + COL_W - COL_PAD, y1: y, y2: y,
          stroke: tc.stroke, 'stroke-width': '1', opacity: '0.4',
        }));
        const abbr = (WEAPON_NAMES[wp.weapon] || `Wpn${wp.weapon}`).substring(0, 4);
        svg.appendChild(svgText(abbr, {
          x: cx, y: y - 2, 'text-anchor': 'middle', 'font-size': '8',
          fill: tc.text, opacity: '0.6',
        }));
      }
      svg.appendChild(svgEl('line', {
        x1: x, x2: x, y1: HEADER_H, y2: this.totalH,
        stroke: '#27272a', 'stroke-width': '1',
      }));
    }
    const rx = TIME_COL_W + this.players.length * COL_W;
    svg.appendChild(svgEl('line', {
      x1: rx, x2: rx, y1: HEADER_H, y2: this.totalH,
      stroke: '#27272a', 'stroke-width': '1',
    }));
  }

  _renderEventLines(svg) {
    for (const ev of this.a.events) {
      if (ev.actor === ev.target) continue;
      if (!this.players.includes(ev.actor) || !this.players.includes(ev.target)) continue;
      const y = this.timeToY(ev.server_time_ms);
      let stroke = '#71717a';
      if (ev.type === 'REVIVE') stroke = '#22c55e';
      else if (['KILL','HEADSHOT','EXPLOSIVE_KILL','KNIFE_KILL','MULTIKILL'].includes(ev.type)) stroke = '#ef4444';
      svg.appendChild(svgEl('line', {
        x1: this.playerX(ev.actor), y1: y, x2: this.playerX(ev.target), y2: y,
        stroke, 'stroke-width': '1.5', opacity: '0.7',
      }));
    }
  }

  _renderEventDots(svg) {
    this.a.events.forEach((ev, idx) => {
      if (!this.players.includes(ev.actor)) return;
      const x = this.playerX(ev.actor);
      const y = this.timeToY(ev.server_time_ms);
      const color = EVENT_COLORS[ev.type] || '#71717a';
      const circle = svgEl('circle', {
        cx: x, cy: y, r: '5',
        fill: color, stroke: '#0e0e12', 'stroke-width': '1.5',
        style: 'cursor:pointer', 'data-event-index': String(idx),
      });
      svg.appendChild(circle);
      if (ev.type === 'HEADSHOT') {
        svg.appendChild(svgEl('circle', { cx: x, cy: y, r: '2', fill: '#0e0e12', 'pointer-events': 'none' }));
      }
      if (ev.type.startsWith('OBJECTIVE')) {
        svg.appendChild(svgEl('circle', {
          cx: x, cy: y, r: '8', fill: 'none', stroke: color,
          'stroke-width': '1', opacity: '0.5', 'pointer-events': 'none',
        }));
      }
    });
  }

  _renderTimeAxis(svg) {
    svg.appendChild(svgEl('rect', { x: 0, y: 0, width: TIME_COL_W, height: this.totalH, fill: '#09090b' }));
    const step = 10000;
    let t = this.startMs - (this.startMs % step) + step;
    while (t < this.endMs) {
      const y = this.timeToY(t);
      const label = msToTimestamp(t - this.startMs);
      svg.appendChild(svgEl('line', { x1: TIME_COL_W, x2: this.totalW, y1: y, y2: y, stroke: '#27272a', 'stroke-width': '1' }));
      svg.appendChild(svgText(label, { x: TIME_COL_W - 6, y: y + 4, 'text-anchor': 'end', 'font-size': '10', fill: '#52525b', 'font-family': 'monospace' }));
      t += step;
    }
    svg.appendChild(svgEl('line', { x1: TIME_COL_W, x2: TIME_COL_W, y1: 0, y2: this.totalH, stroke: '#27272a', 'stroke-width': '1' }));
  }

  _renderColumnHeaders(svg) {
    svg.appendChild(svgEl('rect', { x: 0, y: 0, width: this.totalW, height: HEADER_H, fill: '#09090b' }));
    svg.appendChild(svgEl('line', { x1: 0, x2: this.totalW, y1: HEADER_H, y2: HEADER_H, stroke: '#27272a', 'stroke-width': '1' }));
    for (const cnum of this.players) {
      const p = this.a.players[String(cnum)];
      const colIdx = this.players.indexOf(cnum);
      const cx = TIME_COL_W + colIdx * COL_W + COL_W / 2;
      const tc = this.teamColor(p.team);
      svg.appendChild(svgEl('rect', {
        x: TIME_COL_W + colIdx * COL_W + COL_PAD, y: 2,
        width: COL_W - COL_PAD * 2, height: 3,
        fill: tc.stroke, rx: '1',
      }));
      svg.appendChild(svgText(p.display_name, { x: cx, y: 22, 'text-anchor': 'middle', 'font-size': '11', fill: '#f4f4f5', 'font-weight': '500' }));
      const teamLabel = p.team === 1 ? 'Axis' : p.team === 2 ? 'Allies' : 'Spec';
      svg.appendChild(svgText(teamLabel, { x: cx, y: 38, 'text-anchor': 'middle', 'font-size': '9', fill: tc.text }));
      const hit = svgEl('rect', {
        x: TIME_COL_W + colIdx * COL_W, y: 0,
        width: COL_W, height: HEADER_H,
        fill: 'transparent', style: 'cursor:pointer',
        'data-player-num': String(cnum),
      });
      svg.appendChild(hit);
    }
  }

  _showPlayerModal(cnum) {
    const p = this.a.players[String(cnum)];
    if (!p) return;
    const teamName = p.team === 1 ? 'Axis' : p.team === 2 ? 'Allies' : 'Spec';
    const teamCls  = p.team === 1 ? 'mbadge-ax' : 'mbadge-al';
    document.getElementById('modal-name').textContent = p.display_name;
    const tb = document.getElementById('modal-team-badge');
    tb.textContent = teamName; tb.className = 'mbadge ' + teamCls;
    document.getElementById('modal-class-badge').textContent = inferClass(p.weapon_periods);

    const kills  = this.a.events.filter(e => e.actor === cnum && e.type === 'KILL').length;
    const deaths = this.a.events.filter(e => e.target === cnum &&
      ['KILL','EXPLOSIVE_KILL','KNIFE_KILL','TEAMKILL'].includes(e.type)).length;
    const aliveMs = (p.alive_intervals || []).reduce((s, iv) => s + (iv.end_ms - iv.start_ms), 0);
    const alivePct = this.durationMs > 0 ? Math.round(aliveMs / this.durationMs * 100) : 0;
    const score = this.a.events.filter(e => e.actor === cnum).reduce((s, e) => s + (e.score || 0), 0);
    document.getElementById('modal-kills').textContent     = kills;
    document.getElementById('modal-deaths').textContent    = deaths;
    document.getElementById('modal-alive-pct').textContent = alivePct + '%';
    document.getElementById('modal-score').textContent     = score;

    const seen = new Set();
    const chips = (p.weapon_periods || [])
      .filter(wp => { if (seen.has(wp.weapon)) return false; seen.add(wp.weapon); return true; })
      .map(wp => {
        const span = document.createElement('span');
        span.className = 'weapon-chip';
        span.textContent = WEAPON_NAMES[wp.weapon] || `Wpn ${wp.weapon}`;
        return span;
      });
    const wrapW = document.getElementById('modal-weapons');
    wrapW.innerHTML = '';
    chips.forEach(c => wrapW.appendChild(c));
    if (!chips.length) wrapW.textContent = '—';

    const playerEvents = this.a.events.filter(e =>
      e.actor === cnum || (e.target === cnum && e.actor !== cnum)
    ).slice().sort((a, b) => a.server_time_ms - b.server_time_ms);

    const DOT_COLOR = {
      KILL: '#ef4444', HEADSHOT: '#f97316', EXPLOSIVE_KILL: '#f59e0b',
      KNIFE_KILL: '#a78bfa', MULTIKILL: '#ec4899', TEAMKILL: '#71717a',
      SUICIDE: '#71717a', REVIVE: '#22c55e', TAPOUT: '#3f3f46',
      OBJECTIVE_STEAL: '#eab308', OBJECTIVE_RETURN: '#eab308',
      OBJECTIVE_CAPTURE: '#facc15', OBJECTIVE_DENIAL: '#f97316',
    };
    const wrapE = document.getElementById('modal-events');
    wrapE.innerHTML = '';
    if (!playerEvents.length) {
      wrapE.textContent = 'No events yet.';
    } else {
      playerEvents.forEach(ev => {
        const otherNum = ev.actor === cnum ? ev.target : ev.actor;
        const other = this.a.players[String(otherNum)];
        const otherName = other ? other.display_name : `Player ${otherNum}`;
        const isActor = ev.actor === cnum;
        let desc = ev.type.replace(/_/g, ' ');
        if (isActor && ev.target !== cnum) desc += ` → ${otherName}`;
        else if (!isActor) desc = `killed by ${otherName}`;
        const row = document.createElement('div');
        row.className = 'ev-row';
        row.innerHTML =
          `<span class="ev-time">${msToTimestamp(ev.server_time_ms - this.startMs)}</span>` +
          `<span class="ev-dot" style="background:${DOT_COLOR[ev.type] || '#52525b'}"></span>` +
          `<span class="ev-desc">${esc(desc)}</span>` +
          (MOD_NAMES[ev.means_of_death] ? `<span class="ev-wpn">${esc(MOD_NAMES[ev.means_of_death])}</span>` : '');
        wrapE.appendChild(row);
      });
    }
    document.getElementById('player-modal').style.display = 'flex';
  }

  _handleClick(e) {
    const el = e.target;
    const pnum = el.getAttribute('data-player-num');
    if (pnum !== null) { this._showPlayerModal(parseInt(pnum)); return; }
    const idx = el.getAttribute('data-event-index');
    if (idx === null) { document.getElementById('detail-panel').classList.remove('visible'); return; }
    const ev = this.a.events[parseInt(idx)];
    if (!ev) return;
    const actor = this.a.players[String(ev.actor)];
    const target = this.a.players[String(ev.target)];
    document.getElementById('dp-time').textContent   = msToTimestamp(ev.server_time_ms - this.startMs);
    document.getElementById('dp-event').textContent  = ev.type.replace(/_/g, ' ');
    document.getElementById('dp-actor').textContent  = actor ? actor.display_name : `Client ${ev.actor}`;
    document.getElementById('dp-target').textContent = ev.actor === ev.target ? '—' : (target ? target.display_name : `Client ${ev.target}`);
    document.getElementById('dp-weapon').textContent = MOD_NAMES[ev.means_of_death] || `MOD ${ev.means_of_death}`;
    document.getElementById('dp-score').textContent  = ev.score > 0 ? `+${ev.score}` : String(ev.score);
    document.getElementById('detail-panel').classList.add('visible');
  }
}

// ---- Bootstrap ----
document.getElementById('dp-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('visible');
});

let renderer = null;
let es = null;

function connect() {
  es = new EventSource('/api/live/stream');

  es.addEventListener('snapshot', e => {
    const data = JSON.parse(e.data);
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('status-msg').style.display = 'none';

    // Update header meta
    const players = Object.keys(data.players).length;
    const secs = Math.round(data.meta.duration_ms / 1000);
    document.getElementById('meta-info').textContent =
      `${secs}s · ${data.meta.event_count} events · ${players} players`;

    renderer = new TimelineRenderer(data);
    renderer.render();

    // Auto-scroll to bottom so the most recent action is visible
    const wrap = document.getElementById('timeline-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  });

  es.addEventListener('no_game', () => {
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('status-msg').style.display = 'block';
    document.getElementById('timeline-wrap').style.display = 'none';
  });

  es.addEventListener('match_over', e => {
    es.close();
    const data = JSON.parse(e.data);
    document.getElementById('over-msg').style.display = 'block';
    document.getElementById('over-msg').innerHTML =
      `Match ended. <a href="/replay.html?r=${encodeURIComponent(data.name)}">View full replay →</a>`;
    // Remove the live badge
    document.querySelector('.badge-live').textContent = 'ENDED';
    document.querySelector('.badge-live').style.animation = 'none';
    document.querySelector('.badge-live').style.opacity = '0.5';
  });

  es.onerror = () => {
    // EventSource reconnects automatically; just wait
  };
}

connect();
</script>
